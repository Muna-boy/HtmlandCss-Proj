<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML FORMS</title>
    <style>
        body {
            margin: 0;
            padding: 50px;
            background-color: white;
            display: flex;
        }
        .card {
            width: 12%;
            border: 2px solid;
            padding: 10px;
            text-align: center;
            margin-left: 5cm;
        }
        .price {
            color: red;
        }
        .box {
            width: 12%;
            border: 2px solid;
            padding: 10px;
            text-align: center;
            margin-left: 10px;
        }
        .square {
            width: 12%;
            border: 2px solid;
            padding: 10px;
            text-align: center;
            margin-left: 10px;
        }

    </style>
</head>
<body>
    <div class="card">
        <h3><u>Basic</u></h3>
        <p class="price">$10</p>
        <p>1 project</p>
        <p>Email support</p>
    </div>
    <div class="box">
        <h3><u>Pro</u></h3>
        <p class="price">$20</p>
        <p>5 projects</p>
        <p>Chat support</p>
    </div>
    <div class="square">
        <h3><u>Premium</u></h3>
        <p class="price">$50</p>
        <p>unlimited projects</p>
        <p>24/7 support</p>
    </div>
</body>
</html>
