   <!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <div style="background-color: aquamarine; padding: 1px;">
        <h2 style="text-align: center; color: black;">Welcome to My profile</h2>
    </div>

    
    <h3 style="color: rgb(23, 8, 230); text-align: center;">About Me</h3>
    <img style="margin-left: 45%;" src="art.png " alt="" weight="50px" height="150px">
    <p style="text-align: center; color: gray;">Hello! My name is John. I am Learning HTNL and CSS.</p>

    <h3 style="color: rgb(23, 8, 230); text-align: center;">My Skills</h3>
    <table border="1" cellspacing="0" style="margin: 0 auto; width: 50%; height: 70px;">
        <tr>
            <th>Skill</th>
            <th>Level</th>
        </tr>
        <tr>
            <td>HTML</td>
            <td>Beginner</td>
        </tr>
        <tr>
            <td>CSS</td>
            <td>Beginner</td>
        </tr>

    </table>
    <h3 style="color: rgb(23, 8, 230); text-align: center;">Contact Me</h3>
    <div>
        <form style="width: 50%; padding: 5px; border: 1px solid; margin: 0 auto;">
             <label style="display: block; margin-bottom: 5px;" for="name">Name:</label>
             <input type="text" id="name" style="display: block; width: 99%;">
             <br>
             <label for="email">Email:</label>
             <input type="email" id="email" style="display: block; width: 99%;">
             <br>
             <label for="comment">Message</label>
             <textarea name="message" id="comment" style="display: block; width: 99%;" rows="4"></textarea>
             <br>
             <br>
             <input type="submit" value="Send" style="background-color: aqua;">
        </form>

    </div>
    <br>

    <div style="background-color: grey;">
        <footer style="text-align: center; padding: 2px;">
            &copy; 2025 My Profile Page
        </footer>
    </div>
    
</body>
</html>
